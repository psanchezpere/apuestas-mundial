<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>⚽ WC·2026·NOTAS</title>
<style>
:root {
  --bg: #070f1a;
  --surf: #0a1628;
  --surf2: #0d1f38;
  --cyan: #00ffc8;
  --cyan12: rgba(0,255,200,.12);
  --cyan25: rgba(0,255,200,.25);
  --cyan40: rgba(0,255,200,.40);
  --gold: #f0b429;
  --green: #00e878;
  --red: #ff4d6a;
  --txt: #e8f4f0;
  --txt2: #7a9e96;
  --txt3: #3a5e58;
  --brd: rgba(0,255,200,.14);
  --brd2: rgba(0,255,200,.30);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--txt);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px; line-height: 1.5; min-height: 100%;
}
body {
  padding-top: calc(54px + env(safe-area-inset-top, 0px));
  padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling: touch;
}

/* HEADER */
#hdr {
  position: fixed; top: 0; left: 0; right: 0;
  height: calc(54px + env(safe-area-inset-top, 0px));
  padding-top: env(safe-area-inset-top, 0px);
  background: rgba(7,15,26,.97); border-bottom: 1px solid var(--brd);
  z-index: 500; display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding-left: 16px; padding-right: 14px; gap: 10px;
}
#hdr-logo { font-size: 15px; font-weight: 700; color: var(--cyan); letter-spacing: .04em; -webkit-flex:1; flex:1; }
#sync-dot { font-size: 18px; transition: color .3s; }
#sync-dot.ok      { color: var(--cyan); }
#sync-dot.loading { color: var(--gold); }
#sync-dot.error   { color: var(--red);  }

/* NAV */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(56px + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: rgba(7,15,26,.97); border-top: 1px solid var(--brd);
  z-index: 500; display: -webkit-flex; display: flex;
}
.nav-btn {
  -webkit-flex:1; flex:1;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  background: none; border: none; border-top: 2px solid transparent;
  color: var(--txt2); font-size: 10px; font-weight: 700;
  cursor: pointer; min-height: 44px; gap: 3px; letter-spacing: .05em;
  transition: color .2s, border-color .2s;
}
.nav-btn .ico { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--cyan); border-top-color: var(--cyan); }

/* LOADER */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  z-index: 9999; gap: 20px; transition: opacity .4s;
}
.spinner { width: 44px; height: 44px; border: 3px solid var(--brd2); border-top-color: var(--cyan); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SCREENS */
.screen { display: none; padding: 14px; }
.screen.active { display: block; }

/* STAT CARDS */
.stat-row { display: -webkit-flex; display: flex; gap: 8px; margin-bottom: 16px; }
.stat-card { -webkit-flex:1; flex:1; background: var(--surf); border: 1px solid var(--brd); border-radius: 10px; padding: 12px 14px; }
.stat-card .sv { font-size: 22px; font-weight: 700; color: var(--cyan); }
.stat-card .sl { font-size: 10px; color: var(--txt2); letter-spacing: .04em; text-transform: uppercase; margin-top: 2px; }

/* SECTION SEP */
.section-sep { font-size: 11px; font-weight: 700; color: var(--txt2); letter-spacing: .08em; padding: 12px 0 6px; border-bottom: 1px solid var(--brd); margin-bottom: 8px; }

/* GROUP PILLS */
.pills-wrap { display: -webkit-flex; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; }
.pills-wrap::-webkit-scrollbar { display: none; }
.pill { background: var(--surf2); border: 1px solid var(--brd); color: var(--txt2); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 32px; display: -webkit-flex; display: flex; -webkit-align-items:center; align-items:center; transition: background .15s, color .15s; }
.pill.active { background: var(--cyan25); color: var(--cyan); border-color: var(--cyan); }

/* MATCH CARD */
.match-card {
  background: var(--surf); border: 1px solid var(--brd);
  border-radius: 10px; margin-bottom: 10px; overflow: hidden;
}
.match-head {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding: 12px 14px; gap: 10px; cursor: pointer;
}
.badge { background: var(--cyan12); color: var(--cyan); border: 1px solid var(--brd2); border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; letter-spacing: .04em; flex-shrink: 0; }
.match-teams { -webkit-flex:1; flex:1; font-size: 13px; color: var(--txt); }
.match-date { font-size: 11px; color: var(--txt3); white-space: nowrap; }
.match-note-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.match-note-dot.has-note { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
.match-note-dot.no-note  { background: var(--txt3); }
.match-chevron { color: var(--txt3); font-size: 12px; transition: transform .3s; flex-shrink: 0; margin-left: 2px; }
.match-chevron.open { transform: rotate(180deg); }

/* MATCH BODY */
.match-body { display: none; border-top: 1px solid var(--brd); padding: 12px 14px; }
.match-body.open { display: block; }

/* TEXTAREA DE NOTAS */
.nota-textarea {
  width: 100%; min-height: 120px;
  background: var(--surf2); border: 1px solid var(--brd2);
  color: var(--txt); border-radius: 8px;
  padding: 10px 12px; font-size: 16px;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.6; resize: vertical;
  outline: none; -webkit-appearance: none;
  transition: border-color .2s;
}
.nota-textarea:focus { border-color: var(--cyan); background: rgba(0,255,200,.04); }
.nota-textarea::placeholder { color: var(--txt3); }

.nota-actions {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  gap: 10px; margin-top: 10px;
}
.btn-save {
  background: var(--cyan25); border: 1px solid var(--cyan);
  color: var(--cyan); border-radius: 8px;
  padding: 8px 22px; font-size: 14px; font-weight: 700;
  cursor: pointer; min-height: 40px;
  transition: background .15s;
}
.btn-save:active { background: var(--cyan40); }
.btn-clear {
  background: rgba(255,77,106,.08); border: 1px solid rgba(255,77,106,.25);
  color: var(--red); border-radius: 8px;
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; min-height: 40px;
}
.save-msg { font-size: 11px; color: var(--cyan); font-weight: 600; letter-spacing: .03em; display: none; }

/* RESUMEN — lista de notas */
.nota-resumen-card {
  background: var(--surf); border: 1px solid var(--brd);
  border-radius: 10px; margin-bottom: 8px; padding: 12px 14px;
  cursor: pointer;
}
.nota-resumen-head {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  gap: 10px; margin-bottom: 6px;
}
.nota-resumen-match { font-size: 13px; font-weight: 600; color: var(--txt); -webkit-flex:1; flex:1; }
.nota-resumen-date { font-size: 11px; color: var(--txt3); white-space: nowrap; }
.nota-resumen-preview {
  font-size: 12px; color: var(--txt2);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.5;
}
.empty-msg { text-align: center; padding: 50px 20px; color: var(--txt2); font-size: 14px; font-weight: 600; letter-spacing: .04em; }

/* BUSQUEDA */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-input {
  width: 100%; background: var(--surf2); border: 1px solid var(--brd2);
  color: var(--txt); border-radius: 10px;
  padding: 11px 16px 11px 40px; font-size: 16px;
  outline: none; -webkit-appearance: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--cyan); }
.search-input::placeholder { color: var(--txt3); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
.team-pills { display: -webkit-flex; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; margin-bottom: 14px; scrollbar-width: none; }
.team-pills::-webkit-scrollbar { display: none; }
.team-pill { background: var(--surf2); border: 1px solid var(--brd); color: var(--txt2); border-radius: 20px; padding: 5px 11px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 32px; display: -webkit-flex; display: flex; -webkit-align-items:center; align-items:center; gap: 4px; transition: background .15s, color .15s; }
.team-pill.active { background: var(--cyan25); color: var(--cyan); border-color: var(--cyan); }
.team-result-card { background: var(--surf); border: 1px solid var(--brd); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.team-result-head { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; padding: 10px 14px; gap: 10px; border-bottom: 1px solid var(--brd); background: var(--surf2); }
.team-result-rival { font-size: 13px; color: var(--txt); -webkit-flex:1; flex:1; font-weight: 600; }
.team-result-nota { padding: 12px 14px; font-size: 13px; color: var(--txt2); line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.team-result-goto { font-size: 11px; color: var(--cyan); font-weight: 600; cursor: pointer; white-space: nowrap; text-decoration: underline; }
</style>
</head>
<body>

<div id="loader">
  <div style="font-size:22px;font-weight:700;color:#00ffc8;letter-spacing:.06em;">⚽ WC·2026·NOTAS</div>
  <div class="spinner"></div>
  <div style="color:#7a9e96;font-size:13px;letter-spacing:.06em;">Cargando datos…</div>
</div>

<div id="hdr">
  <div id="hdr-logo">⚽ WC·2026·NOTAS</div>
  <span id="sync-dot" class="ok">●</span>
</div>

<div id="nav">
  <button class="nav-btn active" id="nav-resumen" onclick="showTab('resumen')">
    <span class="ico">📋</span>RESUMEN
  </button>
  <button class="nav-btn" id="nav-notas" onclick="showTab('notas')">
    <span class="ico">✏️</span>NOTAS
  </button>
  <button class="nav-btn" id="nav-busqueda" onclick="showTab('busqueda')">
    <span class="ico">🔍</span>EQUIPOS
  </button>
</div>

<div id="screen-resumen" class="screen active"></div>
<div id="screen-notas" class="screen"></div>
<div id="screen-busqueda" class="screen"></div>

<script>
// ===================== CONFIG =====================
var BIN_ID  = '6a2987afda38895dfea789a1';
var X_KEY   = '$2a$10$GIQhqjikc8jJPqHZxAYxuO20.FtSI3Ng5jOpARqHWMaO9/UcJmMSi';
var BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ===================== PARTIDOS =====================
var GROUPS_DATA = {
  A:[{n:'México',e:'🇲🇽'},{n:'Sudáfrica',e:'🇿🇦'},{n:'Corea del Sur',e:'🇰🇷'},{n:'Chequia',e:'🇨🇿'}],
  B:[{n:'Canadá',e:'🇨🇦'},{n:'Bosnia-Herz.',e:'🇧🇦'},{n:'Qatar',e:'🇶🇦'},{n:'Suiza',e:'🇨🇭'}],
  C:[{n:'Haití',e:'🇭🇹'},{n:'Escocia',e:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},{n:'Brasil',e:'🇧🇷'},{n:'Marruecos',e:'🇲🇦'}],
  D:[{n:'EE.UU.',e:'🇺🇸'},{n:'Paraguay',e:'🇵🇾'},{n:'Australia',e:'🇦🇺'},{n:'Turquía',e:'🇹🇷'}],
  E:[{n:'C.Marfil',e:'🇨🇮'},{n:'Ecuador',e:'🇪🇨'},{n:'Alemania',e:'🇩🇪'},{n:'Curazao',e:'🇨🇼'}],
  F:[{n:'P.Bajos',e:'🇳🇱'},{n:'Japón',e:'🇯🇵'},{n:'Suecia',e:'🇸🇪'},{n:'Túnez',e:'🇹🇳'}],
  G:[{n:'Irán',e:'🇮🇷'},{n:'N.Zelanda',e:'🇳🇿'},{n:'Bélgica',e:'🇧🇪'},{n:'Egipto',e:'🇪🇬'}],
  H:[{n:'Arabia S.',e:'🇸🇦'},{n:'Uruguay',e:'🇺🇾'},{n:'España',e:'🇪🇸'},{n:'Cabo Verde',e:'🇨🇻'}],
  I:[{n:'Francia',e:'🇫🇷'},{n:'Senegal',e:'🇸🇳'},{n:'Noruega',e:'🇳🇴'},{n:'Irak',e:'🇮🇶'}],
  J:[{n:'Argentina',e:'🇦🇷'},{n:'Argelia',e:'🇩🇿'},{n:'Austria',e:'🇦🇹'},{n:'Jordania',e:'🇯🇴'}],
  K:[{n:'Portugal',e:'🇵🇹'},{n:'Colombia',e:'🇨🇴'},{n:'Uzbekistán',e:'🇺🇿'},{n:'R.D.Congo',e:'🇨🇩'}],
  L:[{n:'Inglaterra',e:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Croacia',e:'🇭🇷'},{n:'Ghana',e:'🇬🇭'},{n:'Panamá',e:'🇵🇦'}]
};
var GRP_KEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
var JORNADA_DATES = {
  1:{A:'11 Jun',B:'11 Jun',C:'12 Jun',D:'12 Jun',E:'13 Jun',F:'13 Jun',G:'14 Jun',H:'14 Jun',I:'15 Jun',J:'15 Jun',K:'16 Jun',L:'17 Jun'},
  2:{A:'18 Jun',B:'18 Jun',C:'19 Jun',D:'19 Jun',E:'20 Jun',F:'20 Jun',G:'21 Jun',H:'21 Jun',I:'22 Jun',J:'22 Jun',K:'23 Jun',L:'23 Jun'},
  3:{A:'26 Jun',B:'26 Jun',C:'26 Jun',D:'27 Jun',E:'27 Jun',F:'27 Jun',G:'26 Jun',H:'26 Jun',I:'27 Jun',J:'27 Jun',K:'26 Jun',L:'27 Jun'}
};
var FECHA_J = {1:'11–17 Jun', 2:'18–23 Jun', 3:'24–27 Jun'};

var PARTIDOS = [];
(function(){
  var pat=[[[0,1],[2,3]],[[0,2],[3,1]],[[0,3],[1,2]]];
  GRP_KEYS.forEach(function(g){
    var ts=GROUPS_DATA[g], gl=g.toLowerCase();
    for(var j=0;j<3;j++){
      pat[j].forEach(function(pair,pi){
        PARTIDOS.push({id:gl+(j*2+pi+1), g:g, j:j+1, f:JORNADA_DATES[j+1][g], l:ts[pair[0]], v:ts[pair[1]]});
      });
    }
  });
})();

// ===================== STATE =====================
// DATA structure: { notas: { "a1": "texto...", "b3": "texto..." } }
var DATA = { notas: {} };
var notasFilter = 'TODOS';
var notasOpenId = null;

// ===================== UTILS =====================
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setSyncDot(st){ var d=document.getElementById('sync-dot'); if(d) d.className=st; }

// ===================== API =====================
function apiGet(cb){
  setSyncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('GET', BIN_URL+'/latest', true);
  xhr.setRequestHeader('X-Master-Key', X_KEY);
  xhr.setRequestHeader('X-Bin-Meta', 'false');
  xhr.onload=function(){
    if(xhr.status===200){
      try{ setSyncDot('ok'); cb(null, JSON.parse(xhr.responseText)); }
      catch(e){ setSyncDot('error'); cb(e); }
    } else { setSyncDot('error'); cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror=function(){ setSyncDot('error'); cb(new Error('Network')); };
  xhr.send();
}

function apiPut(data, cb){
  setSyncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('PUT', BIN_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('X-Master-Key', X_KEY);
  xhr.onload=function(){
    if(xhr.status===200){ setSyncDot('ok'); if(cb) cb(null); }
    else{ setSyncDot('error'); if(cb) cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror=function(){ setSyncDot('error'); if(cb) cb(new Error('Network')); };
  xhr.send(JSON.stringify(data));
}

// ===================== INIT =====================
function init(){
  apiGet(function(err, d){
    if(err || !d || !d.notas){ DATA={notas:{}}; hideLoader(); renderAll(); return; }
    DATA=d;
    hideLoader(); renderAll();
  });
}
function hideLoader(){
  var l=document.getElementById('loader');
  l.style.opacity='0';
  setTimeout(function(){ l.style.display='none'; }, 400);
}

// ===================== TABS =====================
function showTab(tab){
  ['resumen','notas','busqueda'].forEach(function(t){
    document.getElementById('screen-'+t).className='screen'+(t===tab?' active':'');
    document.getElementById('nav-'+t).className='nav-btn'+(t===tab?' active':'');
  });
  window.scrollTo(0,0);
  if(tab==='resumen')  renderResumen();
  if(tab==='notas')    renderNotas();
  if(tab==='busqueda') renderBusqueda();
}
function renderAll(){ renderResumen(); renderNotas(); }

// ===================== RESUMEN =====================
var resumenOpenId = null;

function renderResumen(){
  var el=document.getElementById('screen-resumen');
  var notas=DATA.notas||{};
  var totalNotas=0;
  PARTIDOS.forEach(function(p){ if(notas[p.id]&&notas[p.id].trim()) totalNotas++; });

  var html='';

  // Stat cards
  html+='<div class="stat-row">';
  html+='<div class="stat-card"><div class="sv">'+totalNotas+'</div><div class="sl">Partidos con notas</div></div>';
  html+='<div class="stat-card"><div class="sv">'+PARTIDOS.length+'</div><div class="sl">Total partidos</div></div>';
  html+='</div>';

  var ordered=[];
  [1,2,3].forEach(function(j){ GRP_KEYS.forEach(function(g){ PARTIDOS.forEach(function(p){ if(p.j===j&&p.g===g) ordered.push(p); }); }); });
  var conNota=ordered.filter(function(p){ return notas[p.id]&&notas[p.id].trim(); });

  if(!conNota.length){
    html+='<div class="empty-msg">Todavía no hay notas.<br><span style="font-size:12px;font-weight:400;color:var(--txt3)">Ve a ✏️ NOTAS para empezar.</span></div>';
  } else {
    var currentJ=0;
    conNota.forEach(function(p){
      if(p.j!==currentJ){
        currentJ=p.j;
        html+='<div class="section-sep">▸ JORNADA '+p.j+' &nbsp;·&nbsp; '+FECHA_J[p.j]+'</div>';
      }
      var texto=notas[p.id]||'';
      var isOpen=resumenOpenId===p.id;

      html+='<div class="nota-resumen-card" id="rc-'+p.id+'" style="cursor:pointer;padding:0;" onclick="toggleResumen(\''+p.id+'\')">';
      // Head always visible
      html+='<div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;padding:12px 14px;">';
      html+='<div class="badge">G'+p.g+' J'+p.j+'</div>';
      html+='<div class="nota-resumen-match">'+p.l.e+' '+esc(p.l.n)+' <span style="color:var(--txt3)">vs</span> '+esc(p.v.n)+' '+p.v.e+'</div>';
      html+='<div class="nota-resumen-date">'+p.f+'</div>';
      html+='<div style="color:var(--txt3);font-size:12px;transition:transform .3s;transform:'+(isOpen?'rotate(180deg)':'rotate(0deg)')+'" id="rchev-'+p.id+'">▼</div>';
      html+='</div>';
      // Preview line when closed
      if(!isOpen){
        html+='<div class="nota-resumen-preview" style="padding:0 14px 12px;margin-top:-4px;">'+esc(texto)+'</div>';
      }
      // Full nota when open
      if(isOpen){
        html+='<div style="border-top:1px solid var(--brd);padding:13px 14px;font-size:13px;color:var(--txt2);line-height:1.7;white-space:pre-wrap;word-break:break-word;">'+esc(texto)+'</div>';
      }
      html+='</div>';
    });
  }

  el.innerHTML=html;
}

function toggleResumen(pid){
  resumenOpenId = (resumenOpenId===pid) ? null : pid;
  renderResumen();
}

function irANota(pid){
  notasFilter='TODOS';
  notasOpenId=pid;
  showTab('notas');
  // Scroll to the card after render
  setTimeout(function(){
    var card=document.getElementById('mc-'+pid);
    if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

// ===================== NOTAS =====================
function renderNotas(){
  var el=document.getElementById('screen-notas');
  var notas=DATA.notas||{};
  var html='';

  // Group pills
  html+='<div class="pills-wrap">';
  html+='<div class="pill'+(notasFilter==='TODOS'?' active':'')+'" onclick="notasFilter=\'TODOS\';renderNotas()">TODOS</div>';
  GRP_KEYS.forEach(function(g){
    html+='<div class="pill'+(notasFilter===g?' active':'')+'" onclick="notasFilter=\''+g+'\';renderNotas()">G'+g+'</div>';
  });
  html+='</div>';

  var ordered=[];
  [1,2,3].forEach(function(j){ GRP_KEYS.forEach(function(g){ PARTIDOS.forEach(function(p){ if(p.j===j&&p.g===g) ordered.push(p); }); }); });

  var currentJ=0;
  ordered.forEach(function(p){
    if(notasFilter!=='TODOS'&&p.g!==notasFilter) return;
    if(p.j!==currentJ){
      currentJ=p.j;
      html+='<div class="section-sep">▸ JORNADA '+p.j+' &nbsp;·&nbsp; '+FECHA_J[p.j]+'</div>';
    }
    var hasNota=!!(notas[p.id]&&notas[p.id].trim());
    var isOpen=notasOpenId===p.id;

    html+='<div class="match-card" id="mc-'+p.id+'">';
    html+='<div class="match-head" onclick="toggleNota(\''+p.id+'\')">';
    html+='<div class="badge">G'+p.g+' J'+p.j+'</div>';
    html+='<div class="match-teams">'+p.l.e+' '+esc(p.l.n)+' <span style="color:var(--txt3)">vs</span> '+esc(p.v.n)+' '+p.v.e+'</div>';
    html+='<div class="match-date">'+p.f+'</div>';
    html+='<div class="match-note-dot '+(hasNota?'has-note':'no-note')+'" title="'+(hasNota?'Con nota':'Sin nota')+'"></div>';
    html+='<div class="match-chevron'+(isOpen?' open':'')+'">▼</div>';
    html+='</div>';

    html+='<div class="match-body'+(isOpen?' open':'')+'" id="mb-'+p.id+'">';
    if(isOpen) html+=buildNotaBody(p.id);
    html+='</div>';
    html+='</div>';
  });

  el.innerHTML=html;
}

function toggleNota(pid){
  var body=document.getElementById('mb-'+pid);
  var card=document.getElementById('mc-'+pid);
  if(!body||!card) return;
  var chv=card.querySelector('.match-chevron');

  if(notasOpenId===pid){
    notasOpenId=null;
    body.className='match-body'; body.innerHTML='';
    if(chv) chv.className='match-chevron';
  } else {
    if(notasOpenId){
      var pb=document.getElementById('mb-'+notasOpenId);
      var pc=document.getElementById('mc-'+notasOpenId);
      if(pb){ pb.className='match-body'; pb.innerHTML=''; }
      if(pc){ var pchv=pc.querySelector('.match-chevron'); if(pchv) pchv.className='match-chevron'; }
    }
    notasOpenId=pid;
    body.innerHTML=buildNotaBody(pid);
    body.className='match-body open';
    if(chv) chv.className='match-chevron open';
  }
}

function buildNotaBody(pid){
  var notas=DATA.notas||{};
  var texto=notas[pid]||'';
  var html='';
  html+='<textarea class="nota-textarea" id="ta-'+pid+'" placeholder="Escribe tus notas sobre este partido…">'+esc(texto)+'</textarea>';
  html+='<div class="nota-actions">';
  html+='<button class="btn-save" onclick="saveNota(\''+pid+'\')">Guardar</button>';
  html+='<button class="btn-clear" onclick="clearNota(\''+pid+'\')">✕ Borrar</button>';
  html+='<span class="save-msg" id="smsg-'+pid+'">▸ Guardado ✓</span>';
  html+='</div>';
  return html;
}

function saveNota(pid){
  var ta=document.getElementById('ta-'+pid);
  if(!ta) return;
  var texto=ta.value;
  if(!DATA.notas) DATA.notas={};
  DATA.notas[pid]=texto;

  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    // update dot in header of card
    var card=document.getElementById('mc-'+pid);
    if(card){
      var dot=card.querySelector('.match-note-dot');
      if(dot){
        dot.className='match-note-dot '+(texto.trim()?'has-note':'no-note');
        dot.title=texto.trim()?'Con nota':'Sin nota';
      }
    }
    var msg=document.getElementById('smsg-'+pid);
    if(msg){ msg.style.display='inline'; setTimeout(function(){ msg.style.display='none'; }, 2500); }
    renderResumen();
  });
}

function clearNota(pid){
  var ta=document.getElementById('ta-'+pid);
  if(ta) ta.value='';
  if(!DATA.notas) DATA.notas={};
  DATA.notas[pid]='';

  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    var card=document.getElementById('mc-'+pid);
    if(card){
      var dot=card.querySelector('.match-note-dot');
      if(dot){ dot.className='match-note-dot no-note'; dot.title='Sin nota'; }
    }
    var msg=document.getElementById('smsg-'+pid);
    if(msg){ msg.style.display='inline'; setTimeout(function(){ msg.style.display='none'; }, 2500); }
    renderResumen();
  });
}

// ===================== BUSQUEDA =====================
var busquedaQuery = '';
var busquedaTeam  = '';  // nombre exacto del equipo seleccionado

// Build sorted list of all unique teams with emoji
var ALL_TEAMS = (function(){
  var map = {};
  PARTIDOS.forEach(function(p){
    map[p.l.n] = p.l.e;
    map[p.v.n] = p.v.e;
  });
  var arr = [];
  for(var name in map) arr.push({n: name, e: map[name]});
  arr.sort(function(a,b){ return a.n.localeCompare(b.n,'es'); });
  return arr;
})();

function getMatchesForTeam(teamName){
  // Returns all PARTIDOS where the team plays, with note attached
  return PARTIDOS.filter(function(p){
    return p.l.n === teamName || p.v.n === teamName;
  });
}

function renderBusqueda(){
  var el = document.getElementById('screen-busqueda');
  var notas = DATA.notas || {};
  var html = '';

  // Search box
  html += '<div class="search-wrap">';
  html += '<span class="search-icon">🔍</span>';
  html += '<input type="search" class="search-input" id="search-inp" placeholder="Buscar equipo…" value="'+esc(busquedaQuery)+'" oninput="onSearchInput(this.value)">';
  html += '</div>';

  // Filtered team list
  var q = busquedaQuery.toLowerCase().trim();
  var filtered = q
    ? ALL_TEAMS.filter(function(t){ return t.n.toLowerCase().indexOf(q) >= 0; })
    : ALL_TEAMS;

  // Team pills — show filtered list (scrollable)
  if(filtered.length){
    html += '<div class="team-pills">';
    filtered.forEach(function(t){
      var isActive = busquedaTeam === t.n;
      html += '<div class="team-pill'+(isActive?' active':'')+'" onclick="selectTeam(\''+escQ(t.n)+'\')">';
      html += t.e+' '+esc(t.n);
      html += '</div>';
    });
    html += '</div>';
  }

  // Results
  if(!busquedaTeam){
    html += '<div class="empty-msg" style="padding-top:30px;">Selecciona un equipo<br><span style="font-size:12px;font-weight:400;color:var(--txt3)">para ver sus partidos y notas</span></div>';
    el.innerHTML = html;
    return;
  }

  // Find team emoji
  var teamEmoji = '';
  ALL_TEAMS.forEach(function(t){ if(t.n===busquedaTeam) teamEmoji=t.e; });

  // Header for selected team
  html += '<div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;background:var(--surf);border:1px solid var(--brd2);border-radius:10px;">';
  html += '<span style="font-size:28px;">'+teamEmoji+'</span>';
  html += '<div><div style="font-size:17px;font-weight:700;color:var(--cyan);">'+esc(busquedaTeam)+'</div>';
  // count notes
  var matches = getMatchesForTeam(busquedaTeam);
  var conNota = matches.filter(function(p){ return notas[p.id]&&notas[p.id].trim(); });
  html += '<div style="font-size:11px;color:var(--txt2);">'+matches.length+' partidos · '+conNota.length+' con notas</div>';
  html += '</div></div>';

  // Show all matches for this team
  if(!matches.length){
    html += '<div class="empty-msg">Sin partidos encontrados.</div>';
    el.innerHTML = html; return;
  }

  matches.forEach(function(p){
    var isLocal = p.l.n === busquedaTeam;
    var rival   = isLocal ? p.v : p.l;
    var nota    = notas[p.id] || '';
    var hasNota = !!(nota.trim());

    html += '<div class="team-result-card">';

    // Head
    html += '<div class="team-result-head">';
    html += '<div class="badge">G'+p.g+' J'+p.j+'</div>';
    html += '<div class="team-result-rival">';
    html += (isLocal
      ? '<span style="color:var(--cyan)">'+teamEmoji+' '+esc(busquedaTeam)+'</span> <span style="color:var(--txt3)">vs</span> '+rival.e+' '+esc(rival.n)
      : rival.e+' '+esc(rival.n)+' <span style="color:var(--txt3)">vs</span> <span style="color:var(--cyan)">'+teamEmoji+' '+esc(busquedaTeam)+'</span>');
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--txt3);white-space:nowrap;">'+p.f+'</div>';
    html += '</div>';

    // Nota content
    if(hasNota){
      html += '<div class="team-result-nota">'+esc(nota)+'</div>';
      html += '<div style="padding:0 14px 10px;"><span class="team-result-goto" onclick="irANota(\''+p.id+'\')">✏️ Editar nota</span></div>';
    } else {
      html += '<div style="padding:12px 14px;font-size:12px;font-style:italic;color:var(--txt3);">Sin notas para este partido. <span class="team-result-goto" onclick="irANota(\''+p.id+'\')">✏️ Añadir nota</span></div>';
    }

    html += '</div>';
  });

  el.innerHTML = html;
}

function onSearchInput(val){
  busquedaQuery = val;
  // If selected team no longer matches, deselect
  if(busquedaTeam){
    var q = val.toLowerCase().trim();
    if(q && busquedaTeam.toLowerCase().indexOf(q) < 0) busquedaTeam = '';
  }
  renderBusqueda();
}

function selectTeam(name){
  busquedaTeam = (busquedaTeam === name) ? '' : name;
  renderBusqueda();
  // Refocus to keep keyboard context
}

function escQ(s){ if(!s) return ''; return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ===================== START =====================
window.addEventListener('DOMContentLoaded', function(){ init(); });
</script>
