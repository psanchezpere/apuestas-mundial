// ===================== API =====================
function apiGet(cb){
  setSyncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('GET',BIN_URL+'/latest',true);
  xhr.setRequestHeader('X-Master-Key',X_KEY);
  xhr.setRequestHeader('X-Bin-Meta','false');
  xhr.onload=function(){
    if(xhr.status===200){
      try{ setSyncDot('ok'); cb(null,JSON.parse(xhr.responseText)); }
      catch(e){ setSyncDot('error'); cb(e); }
    } else { setSyncDot('error'); cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror=function(){ setSyncDot('error'); cb(new Error('Network')); };
  xhr.send();
}

function apiPut(data,cb){
  setSyncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('PUT',BIN_URL,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('X-Master-Key',X_KEY);
  xhr.onload=function(){
    if(xhr.status===200){ setSyncDot('ok'); if(cb) cb(null); }
    else{ setSyncDot('error'); if(cb) cb(new Error('HTTP '+xhr.status)); }
  };

}

  return 'pending';
}

function playerStats(name){
  var apuestas=DATA.apuestas||{};
  var totalImporte=0, totalGanancia=0, nbets=0, nmatches=0;
  PARTIDOS.forEach(function(p){
    var bets=(apuestas[p.id]||[]).filter(function(b){ return b.player===name; });
    if(bets.length) nmatches++;
    bets.forEach(function(b){
      nbets++;
      var st=betStatus(b);
      var imp=parseFloat(b.importe)||0;
      totalImporte += imp; // always shown as "apostado"
      if(st==='won') totalGanancia += parseFloat(b.ganancia)||0;
      // failed: contributes 0 to ganancia, imp already in totalImporte â†’ balance -= imp
      // pending: excluded from balance calc via separate balanceImporte
    });
  });
  return { importe:totalImporte, ganancia:totalGanancia, balance:totalGanancia-totalImporte, nbets:nbets, nmatches:nmatches };
}

function globalStats(){
  var ti=0, tg=0, tb=0, twon=0, tfail=0, tpend=0;
  PARTICIPANTES.forEach(function(name){
    var s=playerStats(name); ti+=s.importe; tg+=s.ganancia; tb+=s.nbets;
    PARTIDOS.forEach(function(p){
      var bets=(DATA.apuestas&&DATA.apuestas[p.id]||[]).filter(function(b){ return b.player===name; });
      bets.forEach(function(b){
        var st=betStatus(b);
        if(st==='won') twon++;
        else if(st==='failed') tfail++;
        else tpend++;
      });
    });
  });
  return { importe:ti, ganancia:tg, balance:tg-ti, totalBets:tb, won:twon, failed:tfail, pending:tpend };
}

// ===================== RESUMEN =====================

  html+='</div>';

  html+='<div class="stat-card" style="-webkit-flex:2;flex:2;"><div class="sv '+bc+'">'+(gs.balance>=0?'+':'')+gs.balance.toFixed(2)+'â‚¬</div><div class="sl">Balance total (sin pendientes)</div></div>';

  PARTICIPANTES.forEach(function(name){

    var isOpen=!!openPlayerIds[name];

    // count bet statuses
    var nWon=0, nFailed=0, nPending=0;

      var bets=(DATA.apuestas&&DATA.apuestas[p.id]||[]).filter(function(b){ return b.player===name; });
      bets.forEach(function(b){
        var st=betStatus(b);

      });
    });
    var subParts=[];
    if(nWon)     subParts.push('<span style="color:var(--green)">'+nWon+' ganada'+(nWon!==1?'s':'')+'</span>');
    if(nFailed)  subParts.push('<span style="color:var(--red)">'+nFailed+' fallada'+(nFailed!==1?'s':'')+'</span>');
    if(nPending) subParts.push(nPending+' pendiente'+(nPending!==1?'s':''));
    var subStr=subParts.length ? subParts.join(' آ· ') : '0 apuestas';

    html+='<div class="player-card">';
    html+='<div class="player-head" onclick="togglePlayer(\''+escQ(name)+'\')">';
    html+='<div class="player-avatar '+cls+'-avatar">'+PLAYER_EMOJI[name]+'</div>';
    html+='<div class="player-info">';
    html+='<div class="player-name">'+esc(name)+'</div>';
    html+='<div class="player-sub">'+subStr+' آ· '+s.importe.toFixed(2)+'â‚¬ apostados</div>';
    html+='</div>';
    html+='<div class="player-balance '+cls+'-bal '+bc2+'">'+(s.balance>=0?'+':'')+s.balance.toFixed(2)+'â‚¬</div>';
    html+='<div class="player-chevron'+(isOpen?' open':'')+'" id="pchev-'+cls+'">â–¼</div>';
    html+='</div>';
    html+='<div class="player-detail'+(isOpen?' open':'')+'" id="pdetail-'+cls+'">';

function togglePlayer(name){
  var cls=PLAYER_CSS[name];
  var panel=document.getElementById('pdetail-'+cls);
  var chev=document.getElementById('pchev-'+cls);
  if(!panel||!chev) return;
  if(openPlayerIds[name]){
    openPlayerIds[name]=false;
    panel.className='player-detail'; panel.innerHTML='';
    chev.className='player-chevron';
  } else {
    openPlayerIds[name]=true;
    panel.innerHTML=buildPlayerDetail(name);
    panel.className='player-detail open';
    chev.className='player-chevron open';
  }
}

function buildPlayerDetail(name){
  var apuestas=DATA.apuestas||{};
  var html=''; var hasAny=false; var currentJ=0;
  var ordered=[];
  [1,2,3].forEach(function(j){ GRP_KEYS.forEach(function(g){ PARTIDOS.forEach(function(p){ if(p.j===j&&p.g===g) ordered.push(p); }); }); });

  ordered.forEach(function(p){
    var bets=(apuestas[p.id]||[]).filter(function(b){ return b.player===name; });
    if(!bets.length) return;
    hasAny=true;
    if(p.j!==currentJ){ currentJ=p.j; html+='<div class="detail-jornada-sep">â–¸ JORNADA '+p.j+'</div>'; }

    bets.forEach(function(b){
      var imp=parseFloat(b.importe)||0;
      var cuota=b.cuota!==''&&b.cuota!==null&&b.cuota!==undefined ? parseFloat(b.cuota) : null;
      var gan=b.ganancia!==''&&b.ganancia!==null&&b.ganancia!==undefined ? parseFloat(b.ganancia) : null;
      var bal=gan!==null ? gan-imp : null;

      var balHTML='';
      var st=betStatus(b);
      if(st==='pending') balHTML='<span class="detail-bal-neu">pendiente</span>';
      else if(st==='failed') balHTML='<span class="detail-bal-neg">-'+imp.toFixed(2)+'â‚¬</span>';
      else if(bal!==null&&bal>=0) balHTML='<span class="detail-bal-pos">+'+bal.toFixed(2)+'â‚¬</span>';
      else if(bal!==null) balHTML='<span class="detail-bal-neg">'+bal.toFixed(2)+'â‚¬</span>';
      else balHTML='<span class="detail-bal-neu">pendiente</span>';

      // button states
      var st=betStatus(b);
      var isWin  = st==='won';
      var isFail = st==='failed';

      html+='<div class="detail-row">';
      html+='<div class="detail-match-title">'+p.l.e+' '+esc(p.l.n)+' <span style="color:var(--txt3)">vs</span> '+esc(p.v.n)+' '+p.v.e+'</div>';
      html+='<div class="detail-meta">';
      if(b.selecciones&&b.selecciones.trim()){
        html+='<div class="detail-sel"><em>'+esc(b.selecciones)+'</em></div>';
      } else {
        html+='<div class="detail-sel" style="font-style:italic;color:var(--txt3)">sin descripciأ³n</div>';
      }
      if(cuota&&!isNaN(cuota)){
        html+='<div class="detail-cuota">Cuota <span>'+esc(b.cuota)+'</span></div>';
      }
      html+='<div class="detail-importe">'+imp.toFixed(2)+'â‚¬ apostados</div>';
      html+=balHTML;
      html+='</div>';

      // find the match pid for this bet
      var _pid=p.id; var _bid=b.id;
      html+='<div class="detail-actions">';
      html+='<button class="btn-win'+(isWin?' applied':'')+'" onclick="applyWin(\''+escQ(_pid)+'\',\''+escQ(_bid)+'\')">';
      html+=(isWin ? 'âœ… Ganada' : 'ًںڈ† Marcar ganada');
      html+='</button>';
      html+='<button class="btn-fail'+(isFail?' applied':'')+'" onclick="applyFail(\''+escQ(_pid)+'\',\''+escQ(_bid)+'\')">';
      html+=(isFail ? 'â‌Œ Fallada' : 'â‌Œ Marcar fallada');
      html+='</button>';
      html+='</div>';
      html+='</div>';
    });
  });

  if(!hasAny) html='<div class="detail-empty">Sin apuestas registradas aأ؛n.</div>';
  return html;
}

// ===================== REGISTRO =====================
function renderRegistro(){
  var el=document.getElementById('screen-registro');
  var apuestas=DATA.apuestas||{};
  var html='';

  html+='<div class="pills-wrap">';
  html+='<div class="pill'+(regFilter==='TODOS'?' active':'')+'" onclick="regFilter=\'TODOS\';renderRegistro()">TODOS</div>';
  GRP_KEYS.forEach(function(g){
    html+='<div class="pill'+(regFilter===g?' active':'')+'" onclick="regFilter=\''+g+'\';renderRegistro()">G'+g+'</div>';
  });
  html+='</div>';

  var ordered=[];
  [1,2,3].forEach(function(j){ GRP_KEYS.forEach(function(g){ PARTIDOS.forEach(function(p){ if(p.j===j&&p.g===g) ordered.push(p); }); }); });

  var currentJ=0;
  ordered.forEach(function(p){
    if(regFilter!=='TODOS'&&p.g!==regFilter) return;
    if(p.j!==currentJ){
      currentJ=p.j;
      html+='<div class="section-sep">â–¸ JORNADA '+p.j+' &nbsp;آ·&nbsp; '+FECHA_J[p.j]+'</div>';
    }

    html+='<div class="match-teams">'+p.l.e+' '+esc(p.l.n)+' <span style="color:var(--txt3)">vs</span> '+esc(p.v.n)+' '+p.v.e+'</div>';

    html+='<div class="match-chevron'+(isOpen?' open':'')+'">â–¼</div>';

    html+='<div class="match-body'+(isOpen?' open':'')+'" id="mb-'+p.id+'">';
    if(isOpen) html+=buildMatchBody(p.id);
    html+='</div>';
    html+='</div>';
  });

  el.innerHTML=html;
}

function toggleMatch(pid){
  var body=document.getElementById('mb-'+pid);
  var card=document.getElementById('mc-'+pid);
  if(!body||!card) return;
  var chv=card.querySelector('.match-chevron');

  if(regOpenMatchId===pid){
    regOpenMatchId=null;
    body.className='match-body'; body.innerHTML='';
    if(chv) chv.className='match-chevron';
  } else {
    if(regOpenMatchId){
      var pb=document.getElementById('mb-'+regOpenMatchId);
      var pc=document.getElementById('mc-'+regOpenMatchId);
      if(pb){ pb.className='match-body'; pb.innerHTML=''; }
      if(pc){ var pchv=pc.querySelector('.match-chevron'); if(pchv) pchv.className='match-chevron'; }
    }
    regOpenMatchId=pid;
    body.innerHTML=buildMatchBody(pid);
    body.className='match-body open';
    if(chv) chv.className='match-chevron open';
  }
}

function buildMatchBody(pid){
  var bets=(DATA.apuestas&&DATA.apuestas[pid])||[];
  var html='';
  bets.forEach(function(b){ html+=buildBetEntry(pid,b); });

  // Add-bet buttons
  html+='<div style="display:-webkit-flex;display:flex;gap:6px;margin-top:4px;">';
  PARTICIPANTES.forEach(function(name){
    html+='<button class="btn-add-bet" onclick="addBet(\''+pid+'\',\''+escQ(name)+'\')">'+PLAYER_EMOJI[name]+'<br>'+esc(name)+'</button>';
  });
  html+='</div>';
  return html;
}

function buildBetEntry(pid, b){
  var cls=PLAYER_CSS[b.player]||'angel';
  // ganancia coloring
  var ganCls='';
  if(b.ganancia!==''&&b.ganancia!==null&&b.ganancia!==undefined&&b.ganancia!==''){
    var g=parseFloat(b.ganancia), im=parseFloat(b.importe)||0;
    if(!isNaN(g)) ganCls=(g-im)>=0 ? ' gan-ok' : ' gan-ko';
  }

  var html='';
  html+='<div class="bet-entry" id="be-'+b.id+'">';

  // Head: player tag + delete
  html+='<div class="bet-entry-head">';
  html+='<span class="bet-player-tag '+cls+'-tag">'+PLAYER_EMOJI[b.player]+' '+esc(b.player)+'</span>';
  html+='<button class="bet-del" onclick="deleteBet(\''+escQ(pid)+'\',\''+escQ(b.id)+'\')">âœ• Eliminar</button>';
  html+='</div>';

  // Row 1: importe + cuota
  html+='<div class="bet-grid">';
  html+='<div class="bet-field">';
  html+='<label>Importe â‚¬</label>';
  html+='<input type="number" inputmode="decimal" class="bet-input bf-num" id="imp-'+b.id+'" value="'+esc(b.importe)+'" placeholder="0.00" step="0.01">';
  html+='</div>';
  html+='<div class="bet-field">';
  html+='<label>Cuota</label>';
  html+='<input type="number" inputmode="decimal" class="bet-input bf-num" id="cuo-'+b.id+'" value="'+esc(b.cuota)+'" placeholder="1.80" step="0.01" min="1">';
  html+='</div>';
  html+='<div class="bet-field">';
  html+='<label>Ganancia â‚¬</label>';
  html+='<input type="number" inputmode="decimal" class="bet-input bf-num'+ganCls+'" id="gan-'+b.id+'" value="'+esc(b.ganancia)+'" placeholder="pendiente" step="0.01">';
  html+='</div>';
  html+='</div>';

  // Row 2: selecciones (textarea)
  html+='<div class="bet-field" style="margin-bottom:10px;">';
  html+='<label>Selecciones / descripciأ³n</label>';
  html+='<textarea class="bet-input bf-sel" id="sel-'+b.id+'" placeholder="Ej: 1X2 Local, +2.5 goles, Ambos marcanâ€¦">'+esc(b.selecciones)+'</textarea>';
  html+='</div>';

  // Save
  html+='<div class="bet-save-row">';
  html+='<button class="btn-save" onclick="saveBet(\''+escQ(pid)+'\',\''+escQ(b.id)+'\')">Guardar</button>';
  html+='<span class="save-msg" id="smsg-'+b.id+'">â–¸ Guardado âœ“</span>';
  html+='</div>';

  html+='</div>'; // .bet-entry
  return html;
}

// ===================== ACTIONS =====================
function addBet(pid, player){
  if(!DATA.apuestas) DATA.apuestas={};
  if(!DATA.apuestas[pid]) DATA.apuestas[pid]=[];
  DATA.apuestas[pid].push({ id:genId(), player:player, importe:'', cuota:'', ganancia:'', selecciones:'', status:'' });
  var body=document.getElementById('mb-'+pid);
  if(body) body.innerHTML=buildMatchBody(pid);
}

function saveBet(pid, bid){
  if(!DATA.apuestas||!DATA.apuestas[pid]) return;
  var bet=null;
  DATA.apuestas[pid].forEach(function(b){ if(b.id===bid) bet=b; });
  if(!bet) return;

  var impEl=document.getElementById('imp-'+bid);
  var cuoEl=document.getElementById('cuo-'+bid);
  var ganEl=document.getElementById('gan-'+bid);
  var selEl=document.getElementById('sel-'+bid);

  if(impEl) bet.importe=impEl.value;
  if(cuoEl) bet.cuota=cuoEl.value;
  if(ganEl) bet.ganancia=ganEl.value;
  if(selEl) bet.selecciones=selEl.value;

  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    var msg=document.getElementById('smsg-'+bid);
    if(msg){ msg.style.display='inline'; setTimeout(function(){ msg.style.display='none'; },2500); }
    // update ganancia field color without full re-render
    var ganInput=document.getElementById('gan-'+bid);
    if(ganInput&&bet.ganancia!==''){
      var g=parseFloat(bet.ganancia), im=parseFloat(bet.importe)||0;
      if(!isNaN(g)){ ganInput.className='bet-input bf-num'+((g-im)>=0?' gan-ok':' gan-ko'); }
    }
    renderResumen();
  });
}

function deleteBet(pid, bid){
  if(!DATA.apuestas||!DATA.apuestas[pid]) return;
  DATA.apuestas[pid]=DATA.apuestas[pid].filter(function(b){ return b.id!==bid; });
  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    var body=document.getElementById('mb-'+pid);
    if(body) body.innerHTML=buildMatchBody(pid);
    renderResumen();
  });
}

// ===================== WIN / FAIL =====================
function findBet(pid, bid){
  if(!DATA.apuestas||!DATA.apuestas[pid]) return null;
  var found=null;
  DATA.apuestas[pid].forEach(function(b){ if(b.id===bid) found=b; });
  return found;
}

function applyWin(pid, bid){
  var bet=findBet(pid,bid);
  if(!bet) return;
  if(bet.status==='won'){
    // toggle back to pending
    bet.status='';
  } else {
    if(bet.ganancia===''||bet.ganancia===null||bet.ganancia===undefined){
      alert('Introduce primero la ganancia en el registro antes de marcar como ganada.');
      return;
    }
    bet.status='won';
  }
  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    var cls=PLAYER_CSS[bet.player];
    if(openPlayerIds[bet.player]){
      var panel=document.getElementById('pdetail-'+cls);
      if(panel) panel.innerHTML=buildPlayerDetail(bet.player);
    }
    renderResumen();
  });
}

function applyFail(pid, bid){
  var bet=findBet(pid,bid);
  if(!bet) return;
  if(bet.status==='failed'){
    // toggle back to pending
    bet.status='';
  } else {
    bet.status='failed';
  }
  apiPut(DATA, function(err){
    if(err){ setSyncDot('error'); return; }
    var cls=PLAYER_CSS[bet.player];
    if(openPlayerIds[bet.player]){
      var panel=document.getElementById('pdetail-'+cls);
      if(panel) panel.innerHTML=buildPlayerDetail(bet.player);
    }
    renderResumen();
  });
}
